name: MagmaRoar
version: 16.0
main: com.example.magmaroar.MagmaRoarPlugin
api-version: 1.21
commands:
  roar:
    description: Дает Рог Магмы
    usage: /roar
  mace:
    description: Дает Легкую Булаву
    usage: /mace
  flamingbow:
    description: Дает Пылающий арбалет
    usage: /flamingbow
  blood:
    description: Дает Кровавый меч
    usage: /blood
  zombietotem:
    description: Дает яйцо зомби с тотемами
    usage: /zombietotem
  zombieshield:
    description: Дает яйцо зомби со щитом
    usage: /zombieshield
  frost:
    description: Дает Морозный меч
    usage: /frost
  shadow:
    description: Дает Теневой меч
    usage: /shadow
  orbital:
    description: Дает Орбитальную пушку
    usage: /orbital
  sculkbow:
    description: Дает Скалковый арбалет
    usage: /sculkbow
  villagerstaff:
    description: Дает Посох жителя
    usage: /villagerstaff
  explosivepotion:
    description: Дает взрывные зелья
    usage: /explosivepotion
  spider:
    description: Дает Паучий клинок
    usage: /spider
  mjolnir:
    description: Дает Мьёльнир
    usage: /mjolnir
  hypnosis:
    description: Дает Жезл гипноза
    usage: /hypnosis
  scythe:
    description: Дает Косу смерти
    usage: /scythe
  ravager:
    description: Дает Рог разорителя
    usage: /ravager
  meteor:
    description: Дает Адский метеорит
    usage: /meteor
  laser:
    description: Дает Лазер
    usage: /laser
  storm:
    description: Дает Клинок бури
    usage: /storm
  excalibur:
    description: Дает Экскалибур
    usage: /excalibur
  katana:
    description: Дает Катану дракона
    usage: /katana
  reaper:
    description: Дает Косу жнеца
    usage: /reaper
  ludo:
    description: Дает Лудо-меч
    usage: /ludo
  mirror:
    description: Дает Зеркальный меч
    usage: /mirror
  shrinker:
    description: Дает Уменьшитель
    usage: /shrinker
  timeclock:
    description: Дает Часы времени
    usage: /timeclock
  timebow:
    description: Дает Лук времени
    usage: /timebow
  artemis:
    description: Дает Лук Артемиды
    usage: /artemis
  creationbow:
    description: Дает Лук сотворения
    usage: /creationbow
  fossil:
    description: Дает Ископаемый меч
    usage: /fossil
  randomweapon1:
    description: Дает рандомное оружие из первой группы
    usage: /randomweapon1
  randomweapon2:
    description: Дает рандомное оружие из второй группы
    usage: /randomweapon2
  randomweaponall1:
    description: Дает рандомное оружие всем из первой группы
    usage: /randomweaponall1
  randomweaponall2:
    description: Дает рандомное оружие всем из второй группы
    usage: /randomweaponall2
  mitapy:
    description: Призвать NPC Митапы
    usage: /mitapy
  giveroll:
    description: Выдать крутки игроку в сундуке-рулетке
    usage: /giveroll <игрок> [количество]
    permission: magma.admin

permissions:
  magma.admin:
    description: Права администратора MagmaRoar
    default: op

 poseidon:
    description: Дает Трезубец Посейдона
    usage: /poseidon